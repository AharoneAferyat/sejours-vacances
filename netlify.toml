[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  SECRETS_SCAN_ENABLED = "false"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions.gemini]
  timeout = 26

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
